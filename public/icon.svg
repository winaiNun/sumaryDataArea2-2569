<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Highlight overlay top -->
  <rect width="512" height="260" rx="96" fill="white" opacity=".06"/>

  <!-- Bar chart: 3 ascending bars -->
  <rect x="72"  y="310" width="92" height="148" rx="14" fill="white" opacity=".45"/>
  <rect x="204" y="218" width="92" height="240" rx="14" fill="white" opacity=".72"/>
  <rect x="336" y="118" width="92" height="340" rx="14" fill="white"/>

  <!-- Trend line -->
  <polyline points="118,310 250,218 382,118"
    stroke="#93c5fd" stroke-width="10" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots on trend -->
  <circle cx="118" cy="310" r="14" fill="#bfdbfe"/>
  <circle cx="250" cy="218" r="14" fill="#bfdbfe"/>
  <circle cx="382" cy="118" r="16" fill="#60a5fa"/>

  <!-- Base line -->
  <rect x="60" y="464" width="392" height="7" rx="3.5" fill="white" opacity=".25"/>
</svg>
